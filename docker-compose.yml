services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: cce_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./CCE_BACKEND
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: cce_db
      DB_USER: root
      DB_PASSWORD: root_password
      JWT_SECRET: docker-jwt-secret-change-me
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    depends_on:
      - db
      
  frontend:
    build:
      context: ./CCE_FRONTEND
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mysql_data: